name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-regression:
    name: ${{ matrix.os }} / Node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - name: Run the release matrix once
        run: npm run test:release
      - name: Preserve regression evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atlas-regression-${{ matrix.os }}-node-${{ matrix.node }}
          path: artifacts/release-regression
          if-no-files-found: error
          retention-days: 30
